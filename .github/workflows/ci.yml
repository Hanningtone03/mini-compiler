name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install GCC
        run: sudo apt-get install -y gcc
      - name: Build
        run: gcc -Wall -o compiler src/main.c src/lexer.c src/parser.c src/ast.c src/compiler.c src/vm.c
      - name: Run basics test
        run: ./compiler examples/basics.lang
      - name: Run fibonacci test
        run: ./compiler examples/fibonacci.lang